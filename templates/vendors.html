{% extends 'base.html' %}

{% block content %}

                    <th>Company Name</th>
                    <th>GST Number</th>
                    <th>Contact Person</th>
                    <th>Email</th>
                    <th>Phone</th>

                </tr>

            </thead>

            <tbody>

                <tr>

                    <td>1</td>

                    <td>9876543210</td>

                    <td>

                        <span class="badge bg-success">
                            Active
                        </span>

                    </td>

                    <td>

                        <button
                        class="btn btn-warning btn-sm">

                            Edit

                        </button>

                        <button
                        class="btn btn-danger btn-sm">

                            Delete

                        </button>

                    </td>

                </tr>

                <tr>

                    <td>2</td>
                    <td>XYZ Traders</td>
                    <td>GST789456</td>
                    <td>Amit Patel</td>
                    <td>xyz@gmail.com</td>
                    <td>9123456780</td>

                    <td>

                        <span class="badge bg-danger">
                            Inactive
                        </span>

                    </td>

                    <td>

                        <button
                        class="btn btn-warning btn-sm">

                            Edit

                        </button>

                        <button
                        class="btn btn-danger btn-sm">

                            Delete

                        </button>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
