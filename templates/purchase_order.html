{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">

    Purchase Orders

</h2>

<table class="table table-bordered">

    <thead class="table-dark">

        <tr>

            <th>PO ID</th>
            <th>RFQ</th>
            <th>Vendor</th>
            <th>Amount</th>
            <th>Status</th>

        </tr>

    </thead>

    <tbody>

        {% for po in purchase_orders %}

        <tr>

            <td>
                PO-{{ po.0 }}
            </td>

            <td>{{ po.1 }}</td>

            <td>{{ po.2 }}</td>

            <td>
                ₹ {{ po.3 }}
            </td>

            <td>

                <span
                class="badge bg-success">

                    Approved

                </span>

            </td>

        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
