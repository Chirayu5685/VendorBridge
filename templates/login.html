<!DOCTYPE html>
<html>
<head>
    <title>VendorBridge Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-5">

            <div class="card shadow p-4">

                <h2 class="text-center mb-4">
                    VendorBridge ERP
                </h2>

                <form method="POST">

                    {% csrf_token %}

                    {% if error %}
                    <div class="alert alert-danger">
                        {{ error }}
                    </div>
                    {% endif %}

                    <!-- Email -->

                    <div class="mb-3">

                        <label
                        for="email"
                        class="form-label">

                            Email

                        </label>

                        <input
                        type="email"
                        id="email"
                        name="email"
                        class="form-control"
                        placeholder="Enter Email"
                        required>

                    </div>

                    <!-- Password -->

                    <div class="mb-3">

                        <label
                        for="password"
                        class="form-label">

                            Password

                        </label>

                        <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter Password"
                        required>

                    </div>

                    <!-- Forgot Password -->

                    <div class="text-end mb-3">

                        <a href="{% url 'forgot_password' %}">
                            Forgot Password?
                        </a>

                    </div>

                    <!-- Role -->

                    <div class="mb-3">

                        <label
                        for="role"
                        class="form-label">

                            Role

                        </label>

                        <select
                        class="form-control"
                        id="role"
                        name="role"
                        required>

                            <option
                            value=""
                            selected
                            disabled>

                                Select Role

                            </option>

                            <option value="procurement_officer">
                                Procurement Officer
                            </option>

                            <option value="vendor">
                                Vendor
                            </option>

                            <option value="manager">
                                Manager
                            </option>

                            <option value="admin">
                                Admin
                            </option>

                        </select>

                    </div>

                    <!-- Login Button -->

                    <button
                    type="submit"
                    class="btn btn-primary w-100">

                        Login

                    </button>

                    <!-- Signup -->

                    <div class="text-center mt-3">

                        Don't have an account?

                        <a href="{% url 'signup' %}">
                            Sign Up
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
