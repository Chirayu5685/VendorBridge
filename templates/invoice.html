{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">

    Invoices

</h2>

<table class="table table-bordered">

    <thead class="table-dark">

        <tr>

            <th>Invoice ID</th>
            <th>RFQ</th>
            <th>Vendor</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Action</th>

        </tr>

    </thead>

    <tbody>

        {% for i in invoices %}

        <tr>

            <td>
                INV-{{ i.0 }}
            </td>

            <td>
                {{ i.1 }}
            </td>

            <td>
                {{ i.2 }}
            </td>

            <td>
                ₹ {{ i.3 }}
            </td>

            <td>

                <span
                class="badge bg-success">

                    Approved

                </span>

            </td>

            <td>

                <button
                class="btn btn-primary btn-sm"
                onclick="window.print()">

                    Download

                </button>

            </td>

        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
